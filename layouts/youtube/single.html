{{ define "main" }}
<article class="mt-8 mb-12 max-w-3xl mx-auto">
  <header class="mb-6">
    <h1 class="text-2xl font-bold text-neutral-800 dark:text-neutral-100 mb-2">{{ .Title }}</h1>
    <p class="text-sm text-neutral-500 dark:text-neutral-400">{{ .Date.Format "January 2, 2006" }}</p>
  </header>

  {{ with .Params.videoId }}
  <div class="aspect-video mb-8 rounded-lg overflow-hidden">
    <iframe
      src="https://www.youtube-nocookie.com/embed/{{ . }}"
      title="{{ $.Title }}"
      frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
      allowfullscreen
      class="w-full h-full"
      loading="lazy"
    ></iframe>
  </div>
  {{ end }}

  {{ with .Content }}
  <div class="prose dark:prose-invert max-w-none">{{ . }}</div>
  {{ end }}

  {{ with .Params.tags }}
  <div class="mt-8 flex flex-wrap gap-2">
    {{ range . }}
    <a href="/tags/{{ . | urlize }}/" class="text-xs px-2 py-0.5 rounded bg-neutral-200 dark:bg-neutral-700 text-neutral-600 dark:text-neutral-400 hover:bg-neutral-300 dark:hover:bg-neutral-600">{{ . }}</a>
    {{ end }}
  </div>
  {{ end }}
</article>
{{ end }}
